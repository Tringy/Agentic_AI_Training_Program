version: '3.8'

services:
  backend:
    build: ./python
    ports:
      - "8000:8000"
    environment:
      - LLM_PROVIDER=google
    env_file:
      - ./python/.env
    volumes:
      - ./python:/app
    command: >
      uvicorn main:app
      --host 0.0.0.0
      --port 8000
      --reload
      --reload-dir /app
    restart: unless-stopped

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile.dev
    ports:
      - "3000:3000"
    environment:
      - NEXT_PUBLIC_API_URL=http://localhost:8000
      # Polling required on Windows/WSL for file-watch events across bind mounts
      - WATCHPACK_POLLING=true
      - CHOKIDAR_USEPOLLING=true
    volumes:
      - ./frontend:/app
      - frontend_node_modules:/app/node_modules
    command: npm run dev
    depends_on:
      - backend
    restart: unless-stopped

volumes:
  frontend_node_modules:
