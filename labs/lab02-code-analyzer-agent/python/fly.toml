app = "tringo-ai-lab02-code-analyzer-agent-api"
primary_region = "iad"

[build]
  dockerfile = "Dockerfile"

[env]
  LLM_PROVIDER = "google"

[[services]]
internal_port = 8000
processes = ["app"]
protocol = "tcp"
script = "check = \"/health\""
auto_start_machines = false

[http_service]
internal_port = 8000
auto_start_machines = false

[[http_service.checks]]
grace_period = "5s"
interval = "30s"
method = "GET"
path = "/health"
protocol = "http"
timeout = "10s"
type = "http"

[checks.http_service]
grace_period = "5s"
interval = "30s"
method = "GET"
path = "/health"
protocol = "http"
timeout = "10s"
type = "http"

[[vm]]
  cpu_kind = 'shared'
  cpus = 1
  memory_mb = 256
